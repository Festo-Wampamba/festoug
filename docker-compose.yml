services:
  db:
    image: postgres:16-alpine
    container_name: festoug-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: festoug
      POSTGRES_PASSWORD: festoug_dev
      POSTGRES_DB: festoug
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
